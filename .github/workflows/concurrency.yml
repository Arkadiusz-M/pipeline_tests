name: Concurrency - Dynamic Deployment Pipeline

on:
  push:
    branches:
      - main
      - develop

# Prevent overlapping deployments on the same branch
concurrency:
  group: deploy-${{ github.ref }}
  # group: production-server # static - workflow or job
  # group: deploy-${{ github.workflow }}-${{ github.ref }} # dynamic -  workflow or job
  # group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }} 
  cancel-in-progress: true

jobs:
  # 1. Shared build step for both branches
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: echo "npm install"

      - name: Run Tests
        run: echo "npm test"

      - name: Build project
        run: echo "npm run build"

  # 2. Dynamic Deployment Job
  deploy:
    name: Deploy to Environment
    needs: build
    runs-on: ubuntu-latest
    
    # Map branches to specific GitHub Environments
    environment:
          # STEP 1: Selecting the "box" (Environment selection)
          name: ${{ github.ref_name == 'master' && 'Production' || 'Development' }}
          
          # STEP 2: Fetching the content (Context-based variable retrieval)
          url: ${{ vars.APP_URL }}

    steps:
      - name: Display Deployment Info
        run: |
          echo "🚀 Deploying to: ${{ github.ref_name == 'main' && 'PROD' || 'DEV' }} environment"
          echo "Target Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"

      # Conditional logic within steps
      - name: Production specific step
        if: github.ref_name == 'main'
        run: echo "Performing heavy-duty production tasks..."

      - name: Development specific step
        if: github.ref_name == 'develop'
        run: echo "Performing rapid development sync..."

      # Report to Step Summary
      - name: Generate Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.ref_name == 'main' && 'PRODUCTION' || 'DEVELOPMENT' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
