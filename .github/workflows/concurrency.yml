name: Concurrency - Dynamic Deployment Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - ReadMe.md
  workflow_dispatch: 

# Grant write permissions to the GITHUB_TOKEN
permissions:
  contents: write
      

# Prevent overlapping deployments on the same branch
concurrency:
  group: deploy-${{ github.ref }}
  # group: production-server # static - workflow or job
  # group: deploy-${{ github.workflow }}-${{ github.ref }} # dynamic -  workflow or job
  # group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }} 
  cancel-in-progress: true

jobs:
  # 1. Shared build step for both branches
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch all history so we can push back to the branch
          fetch-depth: 0

      - name: Install dependencies
        run: echo "npm install"

      - name: Run Tests
        run: echo "npm test"

      - name: Build project
        run: echo "npm run build"

  # 2. Dynamic Deployment Job
  deploy:
    name: Deploy to Environment
    needs: build
    runs-on: ubuntu-latest
    
    # Map branches to specific GitHub Environments
    environment:
          # STEP 1: Selecting the "box" (Environment selection)
          name: ${{ github.ref_name == 'master' && 'Production' || 'Development' }}
          
          # STEP 2: Fetching the content (Context-based variable retrieval)
          url: ${{ vars.APP_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Display Deployment Info
        run: |
          echo "🚀 Deploying to: ${{ github.ref_name == 'main' && 'PROD' || 'DEV' }} environment"
          echo "Target Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"

      # Conditional logic within steps
      - name: Production specific step
        if: github.ref_name == 'main'
        run: echo "Performing heavy-duty production tasks..."

      - name: Development specific step
        if: github.ref_name == 'develop'
        run: echo "Performing rapid development sync..."

      - name: Update README and Summary
        if: always()
        run: |
          # 1. Define the Badge and Report
          # Replace 'main.yml' with your actual workflow filename
          BADGE="[![[Deployment Status](https://github.com/Arkadiusz-M/pipeline_tests/actions/workflows/concurrency.yml/badge.svg)](https://github.com/Arkadiusz-M/pipeline_tests/actions/workflows/concurrency.yml)"
          REPORT="## 🚀 Deployment Status
          | Metric | Value |
          | :--- | :--- |
          | Environment | ${{ github.ref_name == 'master' && 'PRODUCTION' || 'DEVELOPMENT' }} |
          | Branch | ${{ github.ref_name }} |
          | Status | ✅ Success |
          | Date | $(date +'%Y-%m-%d %H:%M:%S') |"

          # 2. Write to the Magic Summary variable
          echo "$BADGE" >> $GITHUB_STEP_SUMMARY
          echo "$REPORT" >> $GITHUB_STEP_SUMMARY

          # 3. Append to README
          echo "$BADGE" > README.tmp
          echo -e "\n$REPORT" >> README.tmp

          # 4. Git Operations with error handling
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git status
          git add ReadMe.md
          git status
          
          # Only commit and push if there are actual changes to README
          if git diff --staged --quiet; then
            echo "No changes to README.md. Skipping push."
          else
            git commit -m "docs: update deployment status [skip ci]"
            git push
          fi
