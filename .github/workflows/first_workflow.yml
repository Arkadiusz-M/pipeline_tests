# variables - https://docs.github.com/en/actions/how-tos/write-workflows/choose-what-workflows-do/use-variables#default-environment-variables
name: First workflow
run-name: "Run by @${{ github.actor }}. Branch ${{ github.ref_name }}. Deploying build:${{ inputs.build_id }} "
on:
  # push:
  workflow_dispatch: 
    inputs:
      Name:
        description: "Please provide your name"
        required: true
        default: "Name was not provided"
      environment: 
        description: "Please choose environment?"
        required: false
        default: ""
        type: choice
        options:
          - dev
          - test
          - prod
              
env:
  DAY_OF_WEEK: Monday
  YOUR_NAME: KATE
  
jobs:
  Variables:
    name: Welcome_job
    runs-on: ubuntu-latest
    env:
      JobVar: JobVar
    environment: Env-test
    outputs:
      output_var: ${{ steps.StepEnvOutput.outputs.StepEnvOutput }} # Env redirect to other job
    steps:
      - name: Welcome new user - ${{env.YOUR_NAME}}. Starting_day - ${{env.DAY_OF_WEEK}}
        run: |
          echo "Welcome ${{env.YOUR_NAME}}"
          echo "${{env.YOUR_NAME}}, you start a work on ${{env.DAY_OF_WEEK}}"
      - name: GitHub ENV
        run : echo "StepEnvVar=StepEnvVar" >> $GITHUB_ENV
      - name: GitHub OUTPUT
        id: StepEnvOutput
        run : echo "StepEnvOutput=StepEnvOutput" >> $GITHUB_OUTPUT
      - name: Environment varaibles and secrets
        env:
          StepVar: StepVar
        run: |
          # Step
          echo "StepVar: ${{ env.StepVar }}"
          # Job
          echo "JobVar: ${{ env.JobVar }}"
          # Environment
          echo "Environment var: ${{ vars.VAR_ENVS }}"
          echo "Environment secret: ${{ secrets.SECRET_ENV }}" # In logs ***
          # Workflow
          echo "Workflow: ${{ env.DAY_OF_WEEK }}"
          # Repository Settings
          echo "Variables action: ${{ vars.NEW_REPO_VAR }}"
          echo "Secrets action: ${{ secrets.REPO_SECRET }}" # In logs ***
          # GitHub Env
          echo "GitHub env: ${{ env.StepEnvVar }}"
          
  Variables_between_jobs:
    name: Environment_access
    needs: Variables
    if: needs.Variables.outputs.output_var != 'run_deploy' 
    runs-on: ubuntu-latest
    steps:
      - name: Var from the previous jobs -  Variables
        run: |
          echo "VAR: ${{ needs.Variables.outputs.output_var }}"
        
  If_conditional_1:
    name: If_conditional_1
    if: github.event.inputs.environment
    runs-on: ubuntu-latest
    steps:
        - name: Environment access - ${{github.event.inputs.environment}}
          if: github.event.inputs.environment == 'dev'
          run: echo "You get an access to ${{github.event.inputs.environment}}"
        - name: Environment access - ${{github.event.inputs.environment}}
          if: github.event.inputs.environment == 'test' || github.event.inputs.environment == 'prod'
          run: echo "You get an access to ${{github.event.inputs.environment}}"

  If_conditionals_2:
    name: If_conditionals_2
    runs-on: ubuntu-latest
    if: success() || cancelled() 
    steps:
      - name: condition_1
        if: runner.os == 'ubuntu'
        run: echo "The operating system on the runner is $env:RUNNER_OS."
      - name: conditional_2
        if: runner.os != 'ubuntu'
        run: echo "The operating system on the runner is not Ubuntu, it's $RUNNER_OS."
      - name: conditional_3_branch_maine
        if: github.ref == 'refs/heads/main'
        run: echo "It is branch main!"
      - name: conditional_3_branch_main
        if: github.ref != 'refs/heads/main'
        run: echo "It is ${{ github.ref_name }}!"

  workflow_commands_1:
    name: workflow_commands_1
    runs-on: ubuntu-latest
    # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-commands?tool=bash
    steps:
      - name: Group of log lines
        run: |
            echo "::group::Logs"
            echo "Logs - Inside group 1"
            echo "Logs - Inside group 2"
            echo "Logs - Inside group 3"
            echo "::endgroup::"
            echo "::add-mask::Mona The Octocat"
            echo "This value should be masked: Mona The Octocat"
      - name: Summary
        run: echo "### Hello world! :rocket:" >> $GITHUB_STEP_SUMMARY
      - name: Generate list using Markdown
        run: |
          echo "This is the lead in sentence for the list" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY # this is a blank line
          echo "- Lets add a bullet point" >> $GITHUB_STEP_SUMMARY
          echo "- Lets add a second bullet point" >> $GITHUB_STEP_SUMMARY
          echo "- How about a third one?" >> $GITHUB_STEP_SUMMARY
          
  workflow-commands2:
    name:  workflow-commands2
    runs-on: ubuntu-latest
    # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-commands?tool=bash
    steps:
      # 1. Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Working with variables and GITHUB_ENV
      - name: Set dynamic variables
        run: |
          echo "RUN_DATE=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "OS_VERSION=$(uname -s)" >> $GITHUB_ENV

      # 3. Generating the STEP_SUMMARY report
      - name: Create visual summary
        run: |
          echo "## 📊 Execution Report" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Date | $RUN_DATE |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐧 System | $OS_VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 User | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All data has been successfully processed by the agent." >> $GITHUB_STEP_SUMMARY

      # 4. Grouping logs (CLI aesthetics)
      - name: Technical Details (Logs)
        run: |
          echo "::group::Click here to see details"
          echo "Executing commands on the runner..."
          ls -R
          env | grep GITHUB
          echo "::endgroup::"

      # 5. Conditional statement (IF)
      - name: Special step for the author only
        # This step will only run if you (Arkadiusz-M) push the code
        if: github.actor == 'Arkadiusz-M'
        run: echo "Hello Arkadiusz! This step is visible to selected users only."

      # 6. Error handling (FAILURE)
      - name: Error fallback step
        if: failure()
        run: echo "Something went wrong in the previous steps!"
  matrix:
    name: matrix
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        version: [10, 12, 14]
        os: [ubuntu-latest, windows-latest]

jobs:
  testy-aplikacji:
    strategy:
      matrix:
        node: [18, 20, 22]
        version: [1,2,3]
        # os: [ubuntu-latest, windows-latest]
      # runs-on: ${{ matrix.os }}
    steps:
      - name: Użyj Node.js ${{ matrix.node }}
        run: |
          echo "Node:  ${{ matrix.node }}-${{ matrix.version }}"
        
