name: The Great Comparison

on: workflow_dispatch

jobs:
  actions-test-job:
    runs-on: ubuntu-latest
    name: Testing Actions inside one Job
    steps:
      - uses: actions/checkout@v4

      - name: Run Composite
        uses: ./.github/actions/my-composite

      - name: Run Docker
        uses: ./.github/actions/my-docker

  call-reusable:
    uses: ./.github/workflows/reusable-workflow_2.yml